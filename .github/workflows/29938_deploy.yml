name: 29938_deploy

on:
  workflow_run:
    workflows: ["29938_test"]
    types: [completed]

jobs:
  deploy:
    runs-on: self-hosted
    environment: vaja_sec #ker sem dodal v env, ne v repo idk

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      # download artefakt napaka.txt iz prvega workflowa
      - name: Download test artefakt
        uses: actions/download-artifact@v4
        with:
          name: napaka
          path: ./
          run-id: ${{ github.event.workflow_run.id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      # cehck da je napaka.txt prazna (so bli testi uspesni?))
      - name: Preveri, da niso napake
        run: |
          if [ -s napaka.txt ]; then
            echo "Testi so imeli napake! Deployment je preklican."
            cat napaka.txt
            exit 1
          fi
          echo "Testi so uspešni. Nadaljujem z deploymentom..."

      - name: Login Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dockervaja:latest .

      - name: Push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/dockervaja:latest