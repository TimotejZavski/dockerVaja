name: 29938_deploy

on:
  workflow_run:
    workflows: ["29938_test"]
    types: [completed]

jobs:
  deploy:
    runs-on: self-hosted
    environment: production #ker sem dodal v env

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/dockerVaja:latest .

      - name: Push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/dockerVaja:latest